name: Left Shift Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for PR comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install bandit semgrep google-generativeai

      - name: Run GitLeaks (Secrets Scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run Bandit Scan
        run: |
          bandit -r src/ -f json -o bandit-report.json || true

      - name: Run Semgrep Scan
        run: |
          semgrep --config=auto src/ --json > semgrep-report.json || true

      - name: Run Gemini LLM Security Analyzer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true # So we can still upload artifacts even if it fails
        run: |
          python llm_security_analyzer.py

      - name: Post AI Remediation Comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f pr_comment.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file pr_comment.md
          fi

      - name: Upload Security Reports for Dashboard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            semgrep-report.json
            ai-report.json
          retention-days: 14
